name: Coulisse Heir SEO Agent v3

on:
  schedule:
    - cron: "0 2 * * 1"    # Weekly: Monday 10am SGT (2am UTC)
    - cron: "0 2 * * 0,2-6" # Daily: all other days 10am SGT
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - daily

permissions:
  contents: write

jobs:
  seo-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Write credentials
        env:
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GBP_TOKEN_JSON: ${{ secrets.GBP_TOKEN_JSON }}
        run: |
          set -e
          mkdir -p config
          printf '%s' "$GSC_CREDENTIALS_JSON" > config/gsc_credentials.json
          if [ -n "$GBP_TOKEN_JSON" ]; then
            printf '%s' "$GBP_TOKEN_JSON" > config/gbp_token.json
          fi
      - uses: actions/cache@v4
        with:
          path: |
            vault/
            docs/
          key: vault-${{ github.run_number }}
          restore-keys: vault-
      - name: Restore reference vault files from git
        run: |
          git checkout HEAD -- \
            vault/coulissehair/brand_voice.md \
            vault/coulissehair/services.json \
            vault/coulissehair/faqs.json \
            vault/coulissehair/locations.json \
            vault/coulissehair/stylists.json
      - name: Run Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_CREDENTIALS_PATH: config/gsc_credentials.json
          SITE_URL: ${{ secrets.SITE_URL }}
          BRAND: coulissehair
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GBP_ACCOUNT_NAME: ${{ secrets.GBP_ACCOUNT_NAME }}
          GBP_LOCATION_ID_JURONG: ${{ secrets.GBP_LOCATION_ID_JURONG }}
          GBP_LOCATION_ID_PASIRRIS: ${{ secrets.GBP_LOCATION_ID_PASIRRIS }}
          GBP_LOCATION_ID_BISHAN: ${{ secrets.GBP_LOCATION_ID_BISHAN }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          DAY_OF_WEEK="$(date +%u)"
          # Temporary: also run weekly on Tuesday (2) to test email notification
          if [ "$MODE" = "weekly" ] || [ "$DAY_OF_WEEK" = "1" ] || [ "$DAY_OF_WEEK" = "2" ]; then
            python seo_agent.py --weekly
          else
            python seo_agent.py --daily
          fi
      - name: Commit vault + dashboard
        run: |
          git config --global user.name "Coulisse Heir SEO Agent"
          git config --global user.email "seo@coulisseheir.com"
          git add vault/ docs/ || true
          git diff --staged --quiet || git commit -m "agent: update vault + dashboard $(date +'%Y-%m-%d') [automated]"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
